<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Control Cash</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #111110;
  --surface: #1A1918;
  --card: #222120;
  --border: #333230;
  --gold: #C9A96E;
  --gold-dim: #7A6540;
  --cream: #EDE8DF;
  --cream-dim: #9C9589;
  --faint: #4A4845;
  --green: #5A9E72;
  --green-bg: rgba(90,158,114,0.1);
  --yellow: #C9A030;
  --yellow-bg: rgba(201,160,48,0.1);
  --red: #C4523A;
  --red-bg: rgba(196,82,58,0.1);
  --blue: #5E87B0;
}

body {
  background: var(--bg);
  color: var(--cream);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  min-height: 100vh;
}

/* HEADER */
header {
  padding: 1.5rem 1.5rem 1rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 1rem;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 1.3rem;
  color: var(--gold);
  letter-spacing: 0.02em;
}
.logo em { font-style: italic; font-weight: 400; }

.month-nav {
  display: flex;
  align-items: center;
  gap: 0.6rem;
}
.month-nav button {
  background: none;
  border: 1px solid var(--border);
  color: var(--cream-dim);
  width: 26px; height: 26px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 0.75rem;
  transition: border-color 0.2s, color 0.2s;
}
.month-nav button:hover { border-color: var(--gold); color: var(--gold); }
.month-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.78rem;
  color: var(--cream-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  min-width: 100px;
  text-align: center;
}

/* TABS */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem;
  overflow-x: auto;
}
.tab {
  padding: 0.85rem 1rem;
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--faint);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
  white-space: nowrap;
  user-select: none;
}
.tab.active { color: var(--gold); border-bottom-color: var(--gold); }
.tab:hover:not(.active) { color: var(--cream-dim); }

main { padding: 1.5rem; max-width: 860px; margin: 0 auto; }
.panel { display: none; }
.panel.active { display: block; }

/* BUDGET GRID */
.budget-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 0.75rem;
  margin-bottom: 1.5rem;
}

.budget-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1rem 1.1rem;
  cursor: pointer;
  transition: border-color 0.2s;
  position: relative;
}
.budget-card:hover { border-color: var(--gold-dim); }
.budget-card.status-ok { border-left: 3px solid var(--green); }
.budget-card.status-warn { border-left: 3px solid var(--yellow); }
.budget-card.status-over { border-left: 3px solid var(--red); }

.card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 0.6rem;
}
.card-emoji { font-size: 1.1rem; margin-right: 0.4rem; }
.card-name {
  font-size: 0.8rem;
  color: var(--cream-dim);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  flex: 1;
}
.card-status {
  font-size: 0.65rem;
  padding: 2px 7px;
  border-radius: 10px;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  font-weight: 500;
}
.status-ok .card-status { background: var(--green-bg); color: var(--green); }
.status-warn .card-status { background: var(--yellow-bg); color: var(--yellow); }
.status-over .card-status { background: var(--red-bg); color: var(--red); }

.card-amounts {
  display: flex;
  align-items: baseline;
  gap: 0.4rem;
  margin-bottom: 0.6rem;
}
.card-spent {
  font-family: 'DM Mono', monospace;
  font-size: 1.2rem;
  color: var(--cream);
}
.card-limit {
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  color: var(--faint);
}

.progress-track {
  height: 4px;
  background: var(--surface);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.4s ease;
}
.status-ok .progress-fill { background: var(--green); }
.status-warn .progress-fill { background: var(--yellow); }
.status-over .progress-fill { background: var(--red); }

.card-remaining {
  font-size: 0.7rem;
  color: var(--cream-dim);
  margin-top: 0.4rem;
}

/* SAVINGS SECTION */
.savings-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 0.75rem;
  margin-bottom: 1.5rem;
}

.saving-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1rem 1.1rem;
}
.saving-title {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--cream-dim);
  margin-bottom: 0.4rem;
  display: flex;
  align-items: center;
  gap: 0.4rem;
}
.saving-amount {
  font-family: 'DM Mono', monospace;
  font-size: 1.3rem;
  color: var(--gold);
  margin-bottom: 0.15rem;
}
.saving-target { font-size: 0.72rem; color: var(--faint); margin-bottom: 0.6rem; }
.saving-progress-track {
  height: 4px;
  background: var(--surface);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 0.35rem;
}
.saving-progress-fill {
  height: 100%;
  background: var(--gold);
  border-radius: 2px;
  transition: width 0.4s ease;
}
.saving-input-row {
  display: flex;
  gap: 0.4rem;
  margin-top: 0.6rem;
}
.saving-input-row input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--cream);
  font-family: 'DM Mono', monospace;
  font-size: 0.8rem;
  padding: 0.35rem 0.6rem;
  border-radius: 4px;
  outline: none;
}
.saving-input-row input:focus { border-color: var(--gold); }
.saving-input-row button {
  background: var(--gold);
  color: #111;
  border: none;
  padding: 0.35rem 0.7rem;
  border-radius: 4px;
  font-size: 0.75rem;
  font-weight: 500;
  cursor: pointer;
}

/* ADD EXPENSE */
.add-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1.25rem;
  margin-bottom: 1.5rem;
}
.add-title {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  color: var(--gold);
  margin-bottom: 1rem;
  font-style: italic;
}
.add-grid {
  display: grid;
  grid-template-columns: 2fr 1.2fr 1.5fr;
  gap: 0.6rem;
  align-items: end;
}
@media (max-width: 550px) { .add-grid { grid-template-columns: 1fr 1fr; } }

.field { display: flex; flex-direction: column; gap: 0.3rem; }
.field label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--faint); }
.field input, .field select {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--cream);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  padding: 0.5rem 0.65rem;
  border-radius: 4px;
  outline: none;
  width: 100%;
  appearance: none;
  transition: border-color 0.2s;
}
.field input:focus, .field select:focus { border-color: var(--gold); }
.field input::placeholder { color: var(--faint); }

.add-actions {
  display: flex;
  gap: 0.6rem;
  align-items: center;
  margin-top: 0.75rem;
}
.btn-add {
  background: var(--gold);
  color: #111;
  border: none;
  padding: 0.5rem 1.1rem;
  border-radius: 4px;
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  transition: opacity 0.2s;
}
.btn-add:hover { opacity: 0.85; }
.form-msg { font-size: 0.75rem; }

/* ENTRIES */
.sec-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--faint);
  margin-bottom: 0.6rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.sec-label span { flex: 1; height: 1px; background: var(--border); }

.entry-row {
  display: flex;
  align-items: center;
  padding: 0.6rem 0.75rem;
  border-radius: 5px;
  gap: 0.6rem;
  transition: background 0.15s;
}
.entry-row:hover { background: var(--card); }
.entry-emoji { font-size: 0.9rem; flex-shrink: 0; width: 22px; text-align: center; }
.entry-desc { flex: 1; font-size: 0.85rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.entry-cat { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--faint); width: 80px; text-align: right; flex-shrink: 0; }
.entry-amount { font-family: 'DM Mono', monospace; font-size: 0.85rem; color: var(--red); width: 110px; text-align: right; flex-shrink: 0; }
.entry-date { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--faint); width: 42px; text-align: right; flex-shrink: 0; }
.btn-del {
  background: none; border: none; color: var(--faint); cursor: pointer;
  font-size: 0.8rem; padding: 2px 5px; border-radius: 3px;
  opacity: 0; transition: opacity 0.15s, color 0.15s;
}
.entry-row:hover .btn-del { opacity: 1; }
.btn-del:hover { color: var(--red); }

.empty { text-align: center; padding: 2.5rem 1rem; color: var(--faint); font-size: 0.82rem; }

/* REPORT */
.report-block { margin-bottom: 2rem; }
.report-block h3 {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  color: var(--gold);
  font-style: italic;
  font-weight: 400;
  margin-bottom: 1rem;
}

/* AI insight */
.insight-wrap {
  background: rgba(201,169,110,0.06);
  border: 1px solid rgba(201,169,110,0.18);
  border-radius: 8px;
  padding: 1.1rem 1.25rem;
  margin-bottom: 1.5rem;
}
.insight-text { font-size: 0.85rem; line-height: 1.75; color: var(--cream-dim); }
.insight-text strong { color: var(--gold); font-weight: 500; }
.btn-insight {
  background: none;
  border: 1px solid rgba(201,169,110,0.3);
  color: var(--gold);
  padding: 0.45rem 1rem;
  border-radius: 4px;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  cursor: pointer;
  margin-top: 0.75rem;
  transition: background 0.2s;
}
.btn-insight:hover { background: rgba(201,169,110,0.08); }
.spinner {
  width: 14px; height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: inline-block;
  vertical-align: middle;
  margin-right: 0.5rem;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* TREND */
.trend-cols { display: flex; align-items: flex-end; gap: 0.5rem; height: 70px; }
.trend-col { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; }
.trend-bar-wrap { flex: 1; display: flex; align-items: flex-end; width: 100%; }
.trend-bar { width: 100%; border-radius: 3px 3px 0 0; min-height: 2px; }
.trend-lbl { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--faint); text-transform: uppercase; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">full control <em>cash</em></div>
  <div class="month-nav">
    <button id="prevMonth">‹</button>
    <div class="month-label" id="monthLabel"></div>
    <button id="nextMonth">›</button>
  </div>
</header>

<div class="tabs">
  <div class="tab active" data-panel="presupuesto">Presupuesto</div>
  <div class="tab" data-panel="registro">Registrar gasto</div>
  <div class="tab" data-panel="reporte">Reporte</div>
</div>

<main>

  <!-- ===== PRESUPUESTO ===== -->
  <div class="panel active" id="panel-presupuesto">
    <div class="budget-grid" id="budgetGrid"></div>

    <div style="border-top:1px solid var(--border); padding-top:1.25rem; margin-bottom:1.5rem;">
      <div class="sec-label">Ahorro y metas 💰 <span></span></div>
      <div class="savings-grid" id="savingsGrid"></div>
    </div>
  </div>

  <!-- ===== REGISTRO ===== -->
  <div class="panel" id="panel-registro">
    <div class="add-card">
      <div class="add-title">Registrar un gasto</div>
      <div class="add-grid">
        <div class="field">
          <label>Descripción</label>
          <input type="text" id="fDesc" placeholder="ej: Supermercado Dia">
        </div>
        <div class="field">
          <label>Monto (ARS)</label>
          <input type="number" id="fAmount" placeholder="0" min="0" step="100">
        </div>
        <div class="field">
          <label>Categoría</label>
          <select id="fCat">
            <option value="vivienda">🏠 Vivienda</option>
            <option value="mercado">🛒 Mercado / Higiene</option>
            <option value="transporte">🚇 Transporte</option>
            <option value="celular">📱 Celular</option>
            <option value="suscripciones">📺 Suscripciones</option>
            <option value="peluqueria">💇 Peluquería</option>
            <option value="entretenimiento">🍽️ Entretenimiento</option>
            <option value="ropa">👕 Ropa</option>
            <option value="imprevistos">⚠️ Imprevistos</option>
          </select>
        </div>
      </div>
      <div class="add-actions">
        <button class="btn-add" onclick="addEntry()">+ Agregar</button>
        <span class="form-msg" id="formMsg"></span>
      </div>
    </div>

    <div class="sec-label">Gastos del mes <span></span></div>
    <div id="entriesList"></div>
  </div>

  <!-- ===== REPORTE ===== -->
  <div class="panel" id="panel-reporte">

    <div class="insight-wrap">
      <div id="insightInner" style="color:var(--faint); font-size:0.85rem;">Generá un análisis IA de tus finanzas de este mes.</div>
      <button class="btn-insight" onclick="generateInsight()">✦ Analizar con IA</button>
    </div>

    <div class="report-block">
      <h3>Resumen del mes</h3>
      <div id="reportSummary" class="budget-grid"></div>
    </div>

    <div class="report-block">
      <h3>Tendencia últimos 6 meses</h3>
      <div id="trendWrap"></div>
    </div>

  </div>

</main>

<script>
// ============================================================
// BUDGET DEFINITIONS
// ============================================================
const BUDGETS = [
  { id:'vivienda',        emoji:'🏠', name:'Vivienda',           limit:400000, currency:'ARS' },
  { id:'mercado',         emoji:'🛒', name:'Mercado / Higiene',  limit:280000, currency:'ARS' },
  { id:'transporte',      emoji:'🚇', name:'Transporte',         limit:60000,  currency:'ARS' },
  { id:'celular',         emoji:'📱', name:'Celular',            limit:20000,  currency:'ARS' },
  { id:'suscripciones',   emoji:'📺', name:'Suscripciones',      limit:20000,  currency:'ARS' },
  { id:'peluqueria',      emoji:'💇', name:'Peluquería',         limit:60000,  currency:'ARS' },
  { id:'entretenimiento', emoji:'🍽️', name:'Entretenimiento',    limit:50000,  currency:'ARS' },
  { id:'ropa',            emoji:'👕', name:'Ropa',               limit:30000,  currency:'ARS' },
  { id:'imprevistos',     emoji:'⚠️', name:'Imprevistos',        limit:80000,  currency:'ARS' },
];

const SAVINGS = [
  { id:'ahorro_ars', emoji:'💰', name:'Ahorro en pesos', target:200000, currency:'ARS', monthly:true },
  { id:'ahorro_usd', emoji:'💵', name:'Ahorro en dólares', target:150, currency:'USD', monthly:true },
  { id:'fondo_usd',  emoji:'🛡️', name:'Fondo de emergencia', target:3000, currency:'USD', monthly:false, milestone2:6000 },
];

const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MONTHS_SHORT = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const STORAGE_KEY = 'fcc_v1';

let navYear = new Date().getFullYear();
let navMonth = new Date().getMonth();

// ============================================================
// STORAGE
// ============================================================
function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function save(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
function monthKey(y, m) { return `${y}-${String(m+1).padStart(2,'0')}`; }

function getMonth(y, m) {
  const data = load();
  const key = monthKey(y, m);
  if (!data[key]) data[key] = { entries: [], savings: {} };
  if (!data[key].savings) data[key].savings = {};
  return { data, key, month: data[key] };
}

function fmt(n) { return '$ ' + Math.round(n).toLocaleString('es-AR'); }
function fmtUSD(n) { return 'USD ' + n.toLocaleString('es-AR', {minimumFractionDigits:0, maximumFractionDigits:0}); }

function today() {
  const d = new Date();
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
}

// ============================================================
// STATUS
// ============================================================
function getStatus(spent, limit) {
  const pct = spent / limit;
  if (pct >= 1) return 'over';
  if (pct >= 0.75) return 'warn';
  return 'ok';
}
function statusLabel(s) {
  if (s === 'over') return '⚠ Pasada';
  if (s === 'warn') return '↑ Cuidado';
  return '✓ Ok';
}

// ============================================================
// RENDER BUDGET PANEL
// ============================================================
function renderBudget() {
  const { month } = getMonth(navYear, navMonth);

  // Totals per category
  const totals = {};
  BUDGETS.forEach(b => totals[b.id] = 0);
  month.entries.forEach(e => { if (totals[e.cat] !== undefined) totals[e.cat] += e.amount; });

  document.getElementById('budgetGrid').innerHTML = BUDGETS.map(b => {
    const spent = totals[b.id] || 0;
    const pct = Math.min((spent / b.limit) * 100, 100);
    const status = getStatus(spent, b.limit);
    const remaining = b.limit - spent;
    return `
      <div class="budget-card status-${status}" onclick="switchToRegistro('${b.id}')">
        <div class="card-top">
          <span class="card-emoji">${b.emoji}</span>
          <span class="card-name">${b.name}</span>
          <span class="card-status">${statusLabel(status)}</span>
        </div>
        <div class="card-amounts">
          <span class="card-spent">${fmt(spent)}</span>
          <span class="card-limit">/ ${fmt(b.limit)}</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" style="width:${pct.toFixed(1)}%"></div>
        </div>
        <div class="card-remaining">${remaining >= 0 ? 'Te quedan ' + fmt(remaining) : 'Excediste por ' + fmt(Math.abs(remaining))}</div>
      </div>`;
  }).join('');

  renderSavings(month);
}

// ============================================================
// SAVINGS
// ============================================================
function renderSavings(month) {
  const data = load();

  document.getElementById('savingsGrid').innerHTML = SAVINGS.map(s => {
    const isMonthly = s.monthly;
    let current, targetLabel, pct;

    if (isMonthly) {
      // Monthly savings: stored per month
      current = parseFloat(month.savings?.[s.id] || 0);
      const target = s.target;
      pct = Math.min((current / target) * 100, 100);
      const label = s.currency === 'USD' ? fmtUSD(current) + ' / ' + fmtUSD(target) : fmt(current) + ' / ' + fmt(target);
      targetLabel = `Meta mensual: ${s.currency === 'USD' ? fmtUSD(target) : fmt(target)}`;

      return `
        <div class="saving-card">
          <div class="saving-title">${s.emoji} ${s.name}</div>
          <div class="saving-amount">${s.currency === 'USD' ? fmtUSD(current) : fmt(current)}</div>
          <div class="saving-target">${targetLabel}</div>
          <div class="saving-progress-track"><div class="saving-progress-fill" style="width:${pct.toFixed(1)}%"></div></div>
          <div class="saving-input-row">
            <input type="number" id="si_${s.id}" placeholder="${s.currency === 'USD' ? 'USD' : 'ARS'}" min="0">
            <button onclick="addSaving('${s.id}', ${isMonthly})">+ Aportar</button>
          </div>
        </div>`;
    } else {
      // Cumulative: fondo de emergencia — stored globally
      const globalKey = 'global_' + s.id;
      current = parseFloat(data[globalKey] || 0);
      const meta1 = s.target;
      const meta2 = s.milestone2;
      pct = Math.min((current / meta2) * 100, 100);
      const pctMeta1 = Math.min((current / meta1) * 100, 100);

      return `
        <div class="saving-card">
          <div class="saving-title">${s.emoji} ${s.name}</div>
          <div class="saving-amount">${fmtUSD(current)}</div>
          <div class="saving-target">
            Meta 1: ${fmtUSD(meta1)} (${pctMeta1.toFixed(0)}%) · Meta 2: ${fmtUSD(meta2)}
          </div>
          <div class="saving-progress-track"><div class="saving-progress-fill" style="width:${pct.toFixed(1)}%"></div></div>
          <div class="saving-input-row">
            <input type="number" id="si_${s.id}" placeholder="USD" min="0">
            <button onclick="addSaving('${s.id}', false)">+ Aportar</button>
          </div>
        </div>`;
    }
  }).join('');
}

function addSaving(id, isMonthly) {
  const input = document.getElementById('si_' + id);
  const val = parseFloat(input.value);
  if (!val || val <= 0) return;

  if (isMonthly) {
    const { data, key, month } = getMonth(navYear, navMonth);
    month.savings[id] = (parseFloat(month.savings[id] || 0)) + val;
    data[key] = month;
    save(data);
  } else {
    const data = load();
    const globalKey = 'global_' + id;
    data[globalKey] = (parseFloat(data[globalKey] || 0)) + val;
    save(data);
  }
  input.value = '';
  renderAll();
}

// ============================================================
// ADD ENTRY
// ============================================================
function addEntry() {
  const desc = document.getElementById('fDesc').value.trim();
  const amount = parseFloat(document.getElementById('fAmount').value);
  const cat = document.getElementById('fCat').value;

  if (!desc || !amount || amount <= 0) {
    showMsg('Completá descripción y monto.', '#C4523A'); return;
  }

  const { data, key, month } = getMonth(navYear, navMonth);
  month.entries.push({ id: Date.now(), desc, amount, cat, date: today() });
  data[key] = month;
  save(data);

  document.getElementById('fDesc').value = '';
  document.getElementById('fAmount').value = '';
  showMsg('✓ Registrado', '#5A9E72');
  renderAll();
}

function deleteEntry(id) {
  const { data, key, month } = getMonth(navYear, navMonth);
  month.entries = month.entries.filter(e => e.id !== id);
  data[key] = month;
  save(data);
  renderAll();
}

function showMsg(txt, color) {
  const el = document.getElementById('formMsg');
  el.textContent = txt; el.style.color = color;
  setTimeout(() => el.textContent = '', 2500);
}

// ============================================================
// RENDER ENTRIES
// ============================================================
function renderEntries() {
  const { month } = getMonth(navYear, navMonth);
  const list = document.getElementById('entriesList');
  if (!month.entries.length) {
    list.innerHTML = '<div class="empty">Sin gastos registrados este mes.</div>'; return;
  }
  const budgetMap = {};
  BUDGETS.forEach(b => budgetMap[b.id] = b);
  list.innerHTML = [...month.entries].reverse().map(e => {
    const b = budgetMap[e.cat] || {};
    return `
      <div class="entry-row">
        <span class="entry-emoji">${b.emoji||'•'}</span>
        <span class="entry-desc">${e.desc}</span>
        <span class="entry-cat">${b.name||e.cat}</span>
        <span class="entry-amount">${fmt(e.amount)}</span>
        <span class="entry-date">${e.date}</span>
        <button class="btn-del" onclick="deleteEntry(${e.id})">✕</button>
      </div>`;
  }).join('');
}

// ============================================================
// REPORT
// ============================================================
function renderReport() {
  const { month } = getMonth(navYear, navMonth);
  const total = month.entries.reduce((s,e) => s+e.amount, 0);
  const budget = BUDGETS.reduce((s,b) => s+b.limit, 0);
  const balance = budget - total;

  document.getElementById('reportSummary').innerHTML = `
    <div class="budget-card status-${balance>=0?'ok':'over'}" style="cursor:default;">
      <div class="card-top"><span class="card-name">Total gastado</span></div>
      <div class="card-amounts"><span class="card-spent">${fmt(total)}</span><span class="card-limit">/ ${fmt(budget)}</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${Math.min(total/budget*100,100).toFixed(1)}%"></div></div>
      <div class="card-remaining">${balance>=0?'Margen disponible: '+fmt(balance):'Excediste el total por '+fmt(Math.abs(balance))}</div>
    </div>
    <div class="budget-card status-ok" style="cursor:default;">
      <div class="card-top"><span class="card-name">Gasto promedio diario</span></div>
      <div class="card-amounts"><span class="card-spent">${fmt(total/new Date().getDate())}</span></div>
      <div class="card-remaining">estimado al día ${new Date().getDate()}</div>
    </div>
  `;

  renderTrend();
}

function renderTrend() {
  const data = load();
  const months = [];
  for (let i=5; i>=0; i--) {
    let m = navMonth - i, y = navYear;
    while (m < 0) { m += 12; y--; }
    const key = monthKey(y, m);
    const total = (data[key]?.entries||[]).reduce((s,e)=>s+e.amount,0);
    months.push({ label: MONTHS_SHORT[m], total, current: m===navMonth && y===navYear });
  }
  const max = Math.max(...months.map(m=>m.total), 1);
  document.getElementById('trendWrap').innerHTML = `
    <div class="trend-cols">
      ${months.map(m=>`
        <div class="trend-col">
          <div class="trend-bar-wrap">
            <div class="trend-bar" style="height:${(m.total/max*100).toFixed(1)}%; background:${m.current?'var(--gold)':'var(--border)'}; min-height:${m.total>0?4:2}px;"></div>
          </div>
          <div class="trend-lbl">${m.label}</div>
        </div>`).join('')}
    </div>
    <div style="margin-top:0.6rem; display:flex; gap:1rem; flex-wrap:wrap;">
      ${months.map(m=>`<span style="font-family:DM Mono,monospace;font-size:0.65rem;color:${m.current?'var(--gold)':'var(--faint)'};">${m.label}: ${fmt(m.total)}</span>`).join('')}
    </div>`;
}

// ============================================================
// AI INSIGHT
// ============================================================
async function generateInsight() {
  const { month } = getMonth(navYear, navMonth);
  const inner = document.getElementById('insightInner');
  if (!month.entries.length) {
    inner.innerHTML = '<span style="color:var(--faint)">Necesitás al menos un gasto registrado.</span>'; return;
  }

  inner.innerHTML = '<div><span class="spinner"></span>Analizando...</div>';

  const totals = {};
  BUDGETS.forEach(b => totals[b.id] = 0);
  month.entries.forEach(e => { if (totals[e.cat]!==undefined) totals[e.cat]+=e.amount; });

  const catStr = BUDGETS.map(b => {
    const spent = totals[b.id];
    const pct = Math.round(spent/b.limit*100);
    return `${b.name}: ${fmt(spent)} de ${fmt(b.limit)} (${pct}%)`;
  }).join('\n');

  const total = month.entries.reduce((s,e)=>s+e.amount,0);
  const budgetTotal = BUDGETS.reduce((s,b)=>s+b.limit,0);

  const prompt = `Sos una asesora financiera personal para Ana, venezolana viviendo en Buenos Aires. Profesional de comunicaciones y ventas de alto ticket, construyendo múltiples fuentes de ingresos. Su prioridad es autonomía financiera y calidad de vida, no austeridad.

Datos del mes (${MONTHS[navMonth]} ${navYear}):
- Total gastado: ${fmt(total)} de ${fmt(budgetTotal)} presupuestados
- Detalle por categoría vs límite:
${catStr}

Escribí un análisis de 4-5 oraciones en prosa (sin viñetas ni numeración) con:
1. Una observación honesta sobre el patrón de este mes
2. La categoría que más riesgo representa
3. Una recomendación concreta y accionable para el próximo mes

Tono: directo, cálido, sin condescendencia.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:'claude-sonnet-4-6', max_tokens:1000, messages:[{role:'user',content:prompt}] })
    });
    const d = await res.json();
    const text = d.content?.map(b=>b.text||'').join('') || 'Error al obtener análisis.';
    inner.innerHTML = `<div class="insight-text">${text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</div>`;
  } catch {
    inner.innerHTML = '<span style="color:var(--red)">Error de conexión.</span>';
  }
}

// ============================================================
// SWITCH TO REGISTRO WITH CATEGORY PRESELECTED
// ============================================================
function switchToRegistro(catId) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector('[data-panel="registro"]').classList.add('active');
  document.getElementById('panel-registro').classList.add('active');
  document.getElementById('fCat').value = catId;
  document.getElementById('fDesc').focus();
}

// ============================================================
// NAV & TABS
// ============================================================
function updateMonthLabel() {
  document.getElementById('monthLabel').textContent = MONTHS[navMonth].slice(0,3) + ' ' + navYear;
}
document.getElementById('prevMonth').addEventListener('click', () => {
  navMonth--; if(navMonth<0){navMonth=11;navYear--;} updateMonthLabel(); renderAll();
});
document.getElementById('nextMonth').addEventListener('click', () => {
  navMonth++; if(navMonth>11){navMonth=0;navYear++;} updateMonthLabel(); renderAll();
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
    if (tab.dataset.panel === 'reporte') renderReport();
  });
});

document.getElementById('fAmount').addEventListener('keydown', e => { if(e.key==='Enter') addEntry(); });
document.getElementById('fDesc').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('fAmount').focus(); });

// ============================================================
// RENDER ALL
// ============================================================
function renderAll() {
  renderBudget();
  renderEntries();
  const activePanel = document.querySelector('.panel.active')?.id;
  if (activePanel === 'panel-reporte') renderReport();
}

updateMonthLabel();
renderAll();
</script>
</body>
</html>
