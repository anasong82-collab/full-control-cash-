<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Control Cash</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #111110; --surface: #1A1918; --card: #222120; --border: #333230;
  --gold: #C9A96E; --gold-dim: #7A6540; --cream: #EDE8DF; --cream-dim: #9C9589;
  --faint: #4A4845; --green: #5A9E72; --green-bg: rgba(90,158,114,0.1);
  --yellow: #C9A030; --yellow-bg: rgba(201,160,48,0.1);
  --red: #C4523A; --red-bg: rgba(196,82,58,0.1);
}
body { background: var(--bg); color: var(--cream); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; }

.sync-bar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0.4rem 1.5rem; display: flex; align-items: center; justify-content: flex-end;
  gap: 0.5rem; font-size: 0.7rem; color: var(--faint);
}
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--faint); transition: background 0.3s; }
.sync-dot.syncing { background: var(--yellow); animation: pulse 1s infinite; }
.sync-dot.ok { background: var(--green); }
.sync-dot.error { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

header {
  padding: 1.5rem 1.5rem 1rem; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
}
.logo { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--gold); }
.logo em { font-style: italic; font-weight: 400; }
.month-nav { display: flex; align-items: center; gap: 0.6rem; }
.month-nav button {
  background: none; border: 1px solid var(--border); color: var(--cream-dim);
  width: 26px; height: 26px; border-radius: 50%; cursor: pointer; font-size: 0.75rem;
  transition: border-color 0.2s, color 0.2s;
}
.month-nav button:hover { border-color: var(--gold); color: var(--gold); }
.month-label {
  font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--cream-dim);
  text-transform: uppercase; letter-spacing: 0.1em; min-width: 100px; text-align: center;
}

.tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 1.5rem; overflow-x: auto; }
.tab {
  padding: 0.85rem 1rem; font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--faint); cursor: pointer; border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s; white-space: nowrap; user-select: none;
}
.tab.active { color: var(--gold); border-bottom-color: var(--gold); }
.tab:hover:not(.active) { color: var(--cream-dim); }

main { padding: 1.5rem; max-width: 860px; margin: 0 auto; }
.panel { display: none; }
.panel.active { display: block; }

.balance-banner {
  background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  padding: 1.1rem 1.25rem; margin-bottom: 1.25rem;
  display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap;
}
.balance-item { display: flex; flex-direction: column; gap: 0.2rem; }
.balance-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--faint); }
.balance-amount { font-family: 'DM Mono', monospace; font-size: 1.3rem; }
.balance-amount.pos { color: var(--green); }
.balance-amount.neg { color: var(--red); }
.balance-amount.gold { color: var(--gold); }
.balance-divider { width: 1px; height: 36px; background: var(--border); flex-shrink: 0; }

.income-row {
  display: flex; align-items: center; gap: 0.75rem;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 0.6rem 1rem; margin-bottom: 1.25rem; flex-wrap: wrap;
}
.income-row label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--faint); white-space: nowrap; }
.income-row input {
  background: none; border: none; color: var(--gold);
  font-family: 'DM Mono', monospace; font-size: 1rem; outline: none; width: 180px;
}
.income-row input::placeholder { color: var(--faint); }
.income-hint { font-size: 0.68rem; color: var(--faint); }

.budget-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 0.75rem; margin-bottom: 1.5rem; }
.budget-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  padding: 1rem 1.1rem; cursor: pointer; transition: border-color 0.2s;
}
.budget-card:hover { border-color: var(--gold-dim); }
.budget-card.status-ok { border-left: 3px solid var(--green); }
.budget-card.status-warn { border-left: 3px solid var(--yellow); }
.budget-card.status-over { border-left: 3px solid var(--red); }
.card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 0.6rem; }
.card-emoji { font-size: 1rem; margin-right: 0.4rem; }
.card-name { font-size: 0.78rem; color: var(--cream-dim); text-transform: uppercase; letter-spacing: 0.07em; flex: 1; }
.card-status { font-size: 0.62rem; padding: 2px 7px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.07em; font-weight: 500; }
.status-ok .card-status { background: var(--green-bg); color: var(--green); }
.status-warn .card-status { background: var(--yellow-bg); color: var(--yellow); }
.status-over .card-status { background: var(--red-bg); color: var(--red); }
.card-amounts { display: flex; align-items: baseline; gap: 0.4rem; margin-bottom: 0.6rem; }
.card-spent { font-family: 'DM Mono', monospace; font-size: 1.15rem; color: var(--cream); }
.card-limit { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--faint); }
.progress-track { height: 4px; background: var(--surface); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
.status-ok .progress-fill { background: var(--green); }
.status-warn .progress-fill { background: var(--yellow); }
.status-over .progress-fill { background: var(--red); }
.card-remaining { font-size: 0.68rem; color: var(--cream-dim); margin-top: 0.4rem; }

.savings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 0.75rem; margin-bottom: 1.5rem; }
.saving-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.1rem; }
.saving-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--cream-dim); margin-bottom: 0.4rem; }
.saving-amount { font-family: 'DM Mono', monospace; font-size: 1.2rem; color: var(--gold); margin-bottom: 0.15rem; }
.saving-target { font-size: 0.68rem; color: var(--faint); margin-bottom: 0.6rem; }
.saving-progress-track { height: 4px; background: var(--surface); border-radius: 2px; overflow: hidden; margin-bottom: 0.35rem; }
.saving-progress-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.4s ease; }
.saving-input-row { display: flex; gap: 0.4rem; margin-top: 0.6rem; }
.saving-input-row input {
  flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--cream);
  font-family: 'DM Mono', monospace; font-size: 0.8rem; padding: 0.35rem 0.6rem; border-radius: 4px; outline: none;
}
.saving-input-row input:focus { border-color: var(--gold); }
.saving-input-row button { background: var(--gold); color: #111; border: none; padding: 0.35rem 0.7rem; border-radius: 4px; font-size: 0.75rem; font-weight: 500; cursor: pointer; }

.add-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
.add-title { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--gold); margin-bottom: 1rem; font-style: italic; }
.add-grid { display: grid; grid-template-columns: 2fr 1.2fr 1.5fr; gap: 0.6rem; align-items: end; }
@media (max-width: 550px) { .add-grid { grid-template-columns: 1fr 1fr; } }
.field { display: flex; flex-direction: column; gap: 0.3rem; }
.field label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--faint); }
.field input, .field select {
  background: var(--surface); border: 1px solid var(--border); color: var(--cream);
  font-family: 'DM Sans', sans-serif; font-size: 0.85rem; padding: 0.5rem 0.65rem;
  border-radius: 4px; outline: none; width: 100%; appearance: none; transition: border-color 0.2s;
}
.field input:focus, .field select:focus { border-color: var(--gold); }
.field input::placeholder { color: var(--faint); }
.add-actions { display: flex; gap: 0.6rem; align-items: center; margin-top: 0.75rem; flex-wrap: wrap; }
.btn-add { background: var(--gold); color: #111; border: none; padding: 0.5rem 1.1rem; border-radius: 4px; font-size: 0.8rem; font-weight: 500; cursor: pointer; text-transform: uppercase; letter-spacing: 0.06em; transition: opacity 0.2s; }
.btn-add:hover { opacity: 0.85; }
.form-msg { font-size: 0.75rem; }

.sec-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--faint); margin-bottom: 0.6rem; display: flex; align-items: center; gap: 0.5rem; }
.sec-label span { flex: 1; height: 1px; background: var(--border); }
.entry-row { display: flex; align-items: center; padding: 0.6rem 0.75rem; border-radius: 5px; gap: 0.6rem; transition: background 0.15s; }
.entry-row:hover { background: var(--card); }
.entry-emoji { font-size: 0.9rem; flex-shrink: 0; width: 22px; text-align: center; }
.entry-desc { flex: 1; font-size: 0.85rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.entry-cat { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--faint); width: 90px; text-align: right; flex-shrink: 0; }
.entry-amount { font-family: 'DM Mono', monospace; font-size: 0.85rem; color: var(--red); width: 110px; text-align: right; flex-shrink: 0; }
.entry-date { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--faint); width: 42px; text-align: right; flex-shrink: 0; }
.btn-del { background: none; border: none; color: var(--faint); cursor: pointer; font-size: 0.8rem; padding: 2px 5px; border-radius: 3px; opacity: 0; transition: opacity 0.15s, color 0.15s; }
.entry-row:hover .btn-del { opacity: 1; }
.btn-del:hover { color: var(--red); }
.empty { text-align: center; padding: 2.5rem 1rem; color: var(--faint); font-size: 0.82rem; }

.report-block { margin-bottom: 2rem; }
.report-block h3 { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--gold); font-style: italic; font-weight: 400; margin-bottom: 1rem; }
.insight-wrap { background: rgba(201,169,110,0.06); border: 1px solid rgba(201,169,110,0.18); border-radius: 8px; padding: 1.1rem 1.25rem; margin-bottom: 1.5rem; }
.insight-text { font-size: 0.85rem; line-height: 1.75; color: var(--cream-dim); }
.insight-text strong { color: var(--gold); font-weight: 500; }
.btn-insight { background: none; border: 1px solid rgba(201,169,110,0.3); color: var(--gold); padding: 0.45rem 1rem; border-radius: 4px; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; margin-top: 0.75rem; transition: background 0.2s; }
.btn-insight:hover { background: rgba(201,169,110,0.08); }
.spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; vertical-align: middle; margin-right: 0.5rem; }
@keyframes spin { to { transform: rotate(360deg); } }
.trend-cols { display: flex; align-items: flex-end; gap: 0.5rem; height: 70px; }
.trend-col { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; }
.trend-bar-wrap { flex: 1; display: flex; align-items: flex-end; width: 100%; }
.trend-bar { width: 100%; border-radius: 3px 3px 0 0; min-height: 2px; }
.trend-lbl { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--faint); text-transform: uppercase; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.loading-overlay {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; z-index: 100; transition: opacity 0.4s;
}
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.loading-text { font-size: 0.82rem; color: var(--faint); }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner" style="width:24px;height:24px;border-width:3px;"></div>
  <div class="loading-text">Cargando tus datos...</div>
</div>

<div class="sync-bar">
  <div class="sync-dot" id="syncDot"></div>
  <span id="syncLabel">–</span>
</div>

<header>
  <div class="logo">full control <em>cash</em></div>
  <div class="month-nav">
    <button id="prevMonth">‹</button>
    <div class="month-label" id="monthLabel"></div>
    <button id="nextMonth">›</button>
  </div>
</header>

<div class="tabs">
  <div class="tab active" data-panel="presupuesto">Presupuesto</div>
  <div class="tab" data-panel="registro">Registrar</div>
  <div class="tab" data-panel="reporte">Reporte</div>
</div>

<main>
  <div class="panel active" id="panel-presupuesto">
    <div class="balance-banner" id="balanceBanner"></div>
    <div class="income-row">
      <label>Ingreso del mes</label>
      <input type="number" id="incomeInput" placeholder="$ 1.300.000" min="0" step="1000">
      <div class="income-hint">Editá si varía el mes</div>
    </div>
    <div class="budget-grid" id="budgetGrid"></div>
    <div style="border-top:1px solid var(--border); padding-top:1.25rem; margin-bottom:0.75rem;">
      <div class="sec-label">Ahorro y metas <span></span></div>
      <div class="savings-grid" id="savingsGrid"></div>
    </div>
  </div>

  <div class="panel" id="panel-registro">
    <div class="add-card">
      <div class="add-title">Registrar un gasto</div>
      <div class="add-grid">
        <div class="field">
          <label>Descripción</label>
          <input type="text" id="fDesc" placeholder="ej: Supermercado Dia">
        </div>
        <div class="field">
          <label>Monto (ARS)</label>
          <input type="number" id="fAmount" placeholder="0" min="0" step="100">
        </div>
        <div class="field">
          <label>Categoría</label>
          <select id="fCat">
            <option value="impuestos">🏛️ Impuestos</option>
            <option value="vivienda">🏠 Vivienda</option>
            <option value="mercado">🛒 Mercado / Higiene</option>
            <option value="transporte">🚇 Transporte</option>
            <option value="lavanderia">🧺 Lavandería</option>
            <option value="celular">📱 Celular</option>
            <option value="suscripciones">📺 Suscripciones</option>
            <option value="peluqueria">💇 Peluquería</option>
            <option value="entretenimiento">🍽️ Entretenimiento</option>
            <option value="ropa">👕 Ropa</option>
            <option value="imprevistos">⚠️ Imprevistos</option>
          </select>
        </div>
      </div>
      <div class="add-actions">
        <button class="btn-add" onclick="addEntry()">+ Agregar</button>
        <span class="form-msg" id="formMsg"></span>
      </div>
    </div>
    <div class="sec-label">Gastos del mes <span></span></div>
    <div id="entriesList"></div>
  </div>

  <div class="panel" id="panel-reporte">
    <div class="insight-wrap">
      <div id="insightInner" style="color:var(--faint);font-size:0.85rem;">Generá un análisis IA de tus finanzas de este mes.</div>
      <button class="btn-insight" onclick="generateInsight()">✦ Analizar con IA</button>
    </div>
    <div class="report-block">
      <h3>Resumen del mes</h3>
      <div id="reportSummary" class="budget-grid"></div>
    </div>
    <div class="report-block">
      <h3>Tendencia últimos 6 meses</h3>
      <div id="trendWrap"></div>
    </div>
  </div>
</main>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzc2fz2albj67Y1bbgYP0-voxeFGpi0U2t9NmBiXsFZ0EY0dJiIg1ZukJCxMlGoq5qM/exec';

const BUDGETS = [
  { id:'impuestos',      emoji:'🏛️', name:'Impuestos',         limit:45000  },
  { id:'vivienda',       emoji:'🏠', name:'Vivienda',          limit:400000 },
  { id:'mercado',        emoji:'🛒', name:'Mercado / Higiene', limit:280000 },
  { id:'transporte',     emoji:'🚇', name:'Transporte',        limit:42000  },
  { id:'lavanderia',     emoji:'🧺', name:'Lavandería',        limit:18000  },
  { id:'celular',        emoji:'📱', name:'Celular',           limit:20000  },
  { id:'suscripciones',  emoji:'📺', name:'Suscripciones',     limit:20000  },
  { id:'peluqueria',     emoji:'💇', name:'Peluquería',        limit:60000  },
  { id:'entretenimiento',emoji:'🍽️', name:'Entretenimiento',   limit:50000  },
  { id:'ropa',           emoji:'👕', name:'Ropa',              limit:30000  },
  { id:'imprevistos',    emoji:'⚠️', name:'Imprevistos',       limit:80000  },
];

const SAVINGS = [
  { id:'ahorro_ars', emoji:'💰', name:'Ahorro en pesos',     target:255000, currency:'ARS', monthly:true  },
  { id:'ahorro_usd', emoji:'💵', name:'Ahorro en dólares',   target:150,    currency:'USD', monthly:true  },
  { id:'fondo_usd',  emoji:'🛡️', name:'Fondo de emergencia',target:3000,   currency:'USD', monthly:false, milestone2:6000 },
];

const MONTHS       = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MONTHS_SHORT = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const DEFAULT_INCOME = 1300000;

let navYear  = new Date().getFullYear();
let navMonth = new Date().getMonth();
let allData  = {};
let syncTimer = null;

// ── SYNC STATUS ──────────────────────────────────────────────
function setSyncStatus(status, label) {
  document.getElementById('syncDot').className = 'sync-dot ' + status;
  document.getElementById('syncLabel').textContent = label;
}

// ── LOAD FROM SHEETS ─────────────────────────────────────────
async function loadFromSheets() {
  setSyncStatus('syncing', 'Cargando...');
  try {
    const res  = await fetch(SCRIPT_URL + '?t=' + Date.now());
    const json = await res.json();
    allData = json.datos || {};
    setSyncStatus('ok', 'Sincronizado · ' + timeNow());
    document.getElementById('loadingOverlay').classList.add('hidden');
    renderAll();
  } catch(e) {
    setSyncStatus('error', 'Sin conexión — datos locales');
    try { allData = JSON.parse(localStorage.getItem('fcc_local') || '{}'); } catch { allData = {}; }
    document.getElementById('loadingOverlay').classList.add('hidden');
    renderAll();
  }
}

// ── SAVE TO SHEETS ───────────────────────────────────────────
async function saveToSheets() {
  const key   = monthKey(navYear, navMonth);
  const month = allData[key];
  localStorage.setItem('fcc_local', JSON.stringify(allData));
  setSyncStatus('syncing', 'Guardando...');
  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({ mes: key, datos: month }),
      headers: { 'Content-Type': 'text/plain' }
    });
    setSyncStatus('ok', 'Guardado · ' + timeNow());
  } catch(e) {
    setSyncStatus('error', 'Error al guardar');
    setTimeout(saveToSheets, 4000);
  }
}

function scheduleSave() {
  clearTimeout(syncTimer);
  syncTimer = setTimeout(saveToSheets, 800);
}

function timeNow() {
  return new Date().toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' });
}

// ── DATA HELPERS ─────────────────────────────────────────────
function monthKey(y, m) { return y + '-' + String(m + 1).padStart(2, '0'); }

function getMonth() {
  const key = monthKey(navYear, navMonth);
  if (!allData[key]) allData[key] = { income: DEFAULT_INCOME, entries: [], savings: {} };
  if (!allData[key].savings) allData[key].savings = {};
  if (!allData[key].income)  allData[key].income  = DEFAULT_INCOME;
  return allData[key];
}

function fmt(n)    { return '$ ' + Math.round(n).toLocaleString('es-AR'); }
function fmtUSD(n) { return 'USD ' + Math.round(n).toLocaleString('es-AR'); }
function today()   {
  const d = new Date();
  return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0');
}

function getStatus(spent, limit) {
  const p = spent / limit;
  if (p >= 1)    return 'over';
  if (p >= 0.75) return 'warn';
  return 'ok';
}
function statusLabel(s) {
  if (s === 'over') return '⚠ Pasada';
  if (s === 'warn') return '↑ Cuidado';
  return '✓ Ok';
}

// ── INCOME ───────────────────────────────────────────────────
document.getElementById('incomeInput').addEventListener('input', function() {
  const month = getMonth();
  month.income = parseFloat(this.value) || DEFAULT_INCOME;
  scheduleSave();
  renderBanner();
});

// ── BANNER ───────────────────────────────────────────────────
function renderBanner() {
  const month      = getMonth();
  const totalGasto = month.entries.reduce((s, e) => s + e.amount, 0);
  const income     = month.income || DEFAULT_INCOME;
  const restante   = income - totalGasto;
  const pct        = Math.round(totalGasto / income * 100);
  const dayOfMonth = new Date().getDate();
  const promDiario = dayOfMonth > 0 ? totalGasto / dayOfMonth : 0;

  document.getElementById('incomeInput').value       = income === DEFAULT_INCOME ? '' : income;
  document.getElementById('incomeInput').placeholder = '$ ' + DEFAULT_INCOME.toLocaleString('es-AR');

  document.getElementById('balanceBanner').innerHTML = `
    <div class="balance-item">
      <div class="balance-label">Ingreso</div>
      <div class="balance-amount gold">${fmt(income)}</div>
    </div>
    <div class="balance-divider"></div>
    <div class="balance-item">
      <div class="balance-label">Gastado</div>
      <div class="balance-amount neg">${fmt(totalGasto)}</div>
    </div>
    <div class="balance-divider"></div>
    <div class="balance-item">
      <div class="balance-label">Te queda</div>
      <div class="balance-amount ${restante >= 0 ? 'pos' : 'neg'}">${fmt(restante)}</div>
    </div>
    <div class="balance-divider"></div>
    <div class="balance-item">
      <div class="balance-label">% gastado</div>
      <div class="balance-amount ${pct > 100 ? 'neg' : pct > 80 ? 'gold' : 'pos'}">${pct}%</div>
    </div>
  `;
}

// ── BUDGET GRID ──────────────────────────────────────────────
function renderBudget() {
  renderBanner();
  const month  = getMonth();
  const totals = {};
  BUDGETS.forEach(b => totals[b.id] = 0);
  month.entries.forEach(e => { if (totals[e.cat] !== undefined) totals[e.cat] += e.amount; });

  document.getElementById('budgetGrid').innerHTML = BUDGETS.map(b => {
    const spent     = totals[b.id] || 0;
    const pct       = Math.min(spent / b.limit * 100, 100);
    const status    = getStatus(spent, b.limit);
    const remaining = b.limit - spent;
    return `
      <div class="budget-card status-${status}" onclick="switchToRegistro('${b.id}')">
        <div class="card-top">
          <span class="card-emoji">${b.emoji}</span>
          <span class="card-name">${b.name}</span>
          <span class="card-status">${statusLabel(status)}</span>
        </div>
        <div class="card-amounts">
          <span class="card-spent">${fmt(spent)}</span>
          <span class="card-limit">/ ${fmt(b.limit)}</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" style="width:${pct.toFixed(1)}%"></div>
        </div>
        <div class="card-remaining">${remaining >= 0 ? 'Te quedan ' + fmt(remaining) : 'Excediste por ' + fmt(Math.abs(remaining))}</div>
      </div>`;
  }).join('');

  renderSavings(month);
}

// ── SAVINGS ──────────────────────────────────────────────────
function renderSavings(month) {
  document.getElementById('savingsGrid').innerHTML = SAVINGS.map(s => {
    if (s.monthly) {
      const current      = parseFloat(month.savings?.[s.id] || 0);
      const pct          = Math.min(current / s.target * 100, 100);
      const display      = s.currency === 'USD' ? fmtUSD(current) : fmt(current);
      const targetDisplay= s.currency === 'USD' ? fmtUSD(s.target) : fmt(s.target);
      return `
        <div class="saving-card">
          <div class="saving-title">${s.emoji} ${s.name}</div>
          <div class="saving-amount">${display}</div>
          <div class="saving-target">Meta mensual: ${targetDisplay}</div>
          <div class="saving-progress-track"><div class="saving-progress-fill" style="width:${pct.toFixed(1)}%"></div></div>
          <div class="saving-input-row">
            <input type="number" id="si_${s.id}" placeholder="${s.currency}" min="0">
            <button onclick="addSaving('${s.id}', true)">+ Aportar</button>
          </div>
        </div>`;
    } else {
      const current = parseFloat(allData['global_' + s.id] || 0);
      const pct     = Math.min(current / s.milestone2 * 100, 100);
      const pct1    = Math.min(current / s.target * 100, 100);
      return `
        <div class="saving-card">
          <div class="saving-title">${s.emoji} ${s.name}</div>
          <div class="saving-amount">${fmtUSD(current)}</div>
          <div class="saving-target">Meta 1: ${fmtUSD(s.target)} (${pct1.toFixed(0)}%) · Meta 2: ${fmtUSD(s.milestone2)}</div>
          <div class="saving-progress-track"><div class="saving-progress-fill" style="width:${pct.toFixed(1)}%"></div></div>
          <div class="saving-input-row">
            <input type="number" id="si_${s.id}" placeholder="USD" min="0">
            <button onclick="addSaving('${s.id}', false)">+ Aportar</button>
          </div>
        </div>`;
    }
  }).join('');
}

function addSaving(id, isMonthly) {
  const input = document.getElementById('si_' + id);
  const val   = parseFloat(input.value);
  if (!val || val <= 0) return;
  if (isMonthly) {
    const month = getMonth();
    month.savings[id] = (parseFloat(month.savings[id] || 0)) + val;
  } else {
    allData['global_' + id] = (parseFloat(allData['global_' + id] || 0)) + val;
  }
  input.value = '';
  scheduleSave();
  renderAll();
}

// ── ADD ENTRY ────────────────────────────────────────────────
function addEntry() {
  const desc   = document.getElementById('fDesc').value.trim();
  const amount = parseFloat(document.getElementById('fAmount').value);
  const cat    = document.getElementById('fCat').value;
  if (!desc || !amount || amount <= 0) { showMsg('Completá descripción y monto.', 'var(--red)'); return; }
  const month = getMonth();
  month.entries.push({ id: Date.now(), desc, amount, cat, date: today() });
  document.getElementById('fDesc').value   = '';
  document.getElementById('fAmount').value = '';
  showMsg('✓ Guardado', 'var(--green)');
  scheduleSave();
  renderAll();
}

function deleteEntry(id) {
  const month = getMonth();
  month.entries = month.entries.filter(e => e.id !== id);
  scheduleSave();
  renderAll();
}

function showMsg(txt, color) {
  const el = document.getElementById('formMsg');
  el.textContent = txt; el.style.color = color;
  setTimeout(() => el.textContent = '', 2500);
}

// ── ENTRIES LIST ─────────────────────────────────────────────
function renderEntries() {
  const month     = getMonth();
  const list      = document.getElementById('entriesList');
  const budgetMap = {};
  BUDGETS.forEach(b => budgetMap[b.id] = b);
  if (!month.entries.length) {
    list.innerHTML = '<div class="empty">Sin gastos este mes.<br>Tocá una categoría arriba para empezar.</div>';
    return;
  }
  list.innerHTML = [...month.entries].reverse().map(e => {
    const b = budgetMap[e.cat] || {};
    return `
      <div class="entry-row">
        <span class="entry-emoji">${b.emoji || '•'}</span>
        <span class="entry-desc">${e.desc}</span>
        <span class="entry-cat">${b.name || e.cat}</span>
        <span class="entry-amount">${fmt(e.amount)}</span>
        <span class="entry-date">${e.date}</span>
        <button class="btn-del" onclick="deleteEntry(${e.id})">✕</button>
      </div>`;
  }).join('');
}

// ── REPORT ───────────────────────────────────────────────────
function renderReport() {
  const month      = getMonth();
  const total      = month.entries.reduce((s, e) => s + e.amount, 0);
  const income     = month.income || DEFAULT_INCOME;
  const balance    = income - total;
  const dayOfMonth = new Date().getDate();
  const promDiario = dayOfMonth > 0 ? total / dayOfMonth : 0;

  // Proyección solo válida a partir del día 7
  const proyeccion = dayOfMonth >= 7 ? promDiario * 30 : null;

  document.getElementById('reportSummary').innerHTML = `
    <div class="budget-card status-${balance >= 0 ? 'ok' : 'over'}" style="cursor:default;">
      <div class="card-top"><span class="card-name">Total gastado vs ingreso</span></div>
      <div class="card-amounts">
        <span class="card-spent">${fmt(total)}</span>
        <span class="card-limit">/ ${fmt(income)}</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${Math.min(total / income * 100, 100).toFixed(1)}%"></div>
      </div>
      <div class="card-remaining">${balance >= 0 ? 'Te quedan ' + fmt(balance) : 'Excediste por ' + fmt(Math.abs(balance))}</div>
    </div>
    <div class="budget-card status-ok" style="cursor:default;">
      <div class="card-top"><span class="card-name">Promedio diario</span></div>
      <div class="card-amounts"><span class="card-spent">${fmt(promDiario)}</span></div>
      <div class="card-remaining">basado en ${dayOfMonth} día${dayOfMonth !== 1 ? 's' : ''} transcurrido${dayOfMonth !== 1 ? 's' : ''}</div>
    </div>
    ${proyeccion !== null ? `
    <div class="budget-card status-${proyeccion > income ? 'over' : proyeccion > income * 0.9 ? 'warn' : 'ok'}" style="cursor:default;">
      <div class="card-top"><span class="card-name">Proyección del mes</span></div>
      <div class="card-amounts"><span class="card-spent">${fmt(proyeccion)}</span></div>
      <div class="card-remaining">si seguís este ritmo los 30 días</div>
    </div>` : `
    <div class="budget-card" style="cursor:default; opacity:0.5;">
      <div class="card-top"><span class="card-name">Proyección del mes</span></div>
      <div class="card-amounts"><span class="card-spent" style="font-size:0.9rem;color:var(--faint);">Disponible desde el día 7</span></div>
      <div class="card-remaining">necesitás más días para proyectar</div>
    </div>`}
  `;

  // Trend
  const months = [];
  for (let i = 5; i >= 0; i--) {
    let m = navMonth - i, y = navYear;
    while (m < 0) { m += 12; y--; }
    const key = monthKey(y, m);
    const t   = (allData[key]?.entries || []).reduce((s, e) => s + e.amount, 0);
    months.push({ label: MONTHS_SHORT[m], total: t, current: m === navMonth && y === navYear });
  }
  const max = Math.max(...months.map(m => m.total), 1);
  document.getElementById('trendWrap').innerHTML = `
    <div class="trend-cols">
      ${months.map(m => `
        <div class="trend-col">
          <div class="trend-bar-wrap">
            <div class="trend-bar" style="height:${(m.total / max * 100).toFixed(1)}%; background:${m.current ? 'var(--gold)' : 'var(--border)'}; min-height:${m.total > 0 ? 4 : 2}px;"></div>
          </div>
          <div class="trend-lbl">${m.label}</div>
        </div>`).join('')}
    </div>
    <div style="margin-top:0.6rem;display:flex;gap:1rem;flex-wrap:wrap;">
      ${months.map(m => `<span style="font-family:DM Mono,monospace;font-size:0.65rem;color:${m.current ? 'var(--gold)' : 'var(--faint)'};">${m.label}: ${fmt(m.total)}</span>`).join('')}
    </div>`;
}

// ── AI INSIGHT ───────────────────────────────────────────────
async function generateInsight() {
  const month = getMonth();
  const inner = document.getElementById('insightInner');
  if (!month.entries.length) { inner.innerHTML = '<span style="color:var(--faint)">Necesitás al menos un gasto registrado.</span>'; return; }
  inner.innerHTML = '<div><span class="spinner"></span>Analizando...</div>';
  const totals = {};
  BUDGETS.forEach(b => totals[b.id] = 0);
  month.entries.forEach(e => { if (totals[e.cat] !== undefined) totals[e.cat] += e.amount; });
  const catStr = BUDGETS.map(b => `${b.name}: ${fmt(totals[b.id])} de ${fmt(b.limit)} (${Math.round(totals[b.id] / b.limit * 100)}%)`).join('\n');
  const total  = month.entries.reduce((s, e) => s + e.amount, 0);
  const income = month.income || DEFAULT_INCOME;
  const prompt = `Sos una asesora financiera personal para Ana, venezolana viviendo en Buenos Aires. Profesional de comunicaciones y ventas de alto ticket, construyendo múltiples fuentes de ingresos. Su prioridad es autonomía financiera y calidad de vida, no austeridad.

Datos del mes (${MONTHS[navMonth]} ${navYear}):
- Ingreso: ${fmt(income)}
- Total gastado: ${fmt(total)}
- Balance: ${fmt(income - total)}
- Detalle por categoría vs límite:
${catStr}

Escribí un análisis de 4-5 oraciones en prosa (sin viñetas ni numeración) con:
1. Una observación honesta sobre el patrón de este mes
2. La categoría que más riesgo representa
3. Una recomendación concreta y accionable para el próximo mes
Tono: directo, cálido, sin condescendencia.`;

  try {
    const res  = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 1000, messages: [{ role: 'user', content: prompt }] })
    });
    const d    = await res.json();
    const text = d.content?.map(b => b.text || '').join('') || 'Error al obtener análisis.';
    inner.innerHTML = `<div class="insight-text">${text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</div>`;
  } catch { inner.innerHTML = '<span style="color:var(--red)">Error de conexión.</span>'; }
}

// ── NAVIGATION ───────────────────────────────────────────────
function switchToRegistro(catId) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector('[data-panel="registro"]').classList.add('active');
  document.getElementById('panel-registro').classList.add('active');
  document.getElementById('fCat').value = catId;
  document.getElementById('fDesc').focus();
}

function updateMonthLabel() {
  document.getElementById('monthLabel').textContent = MONTHS[navMonth].slice(0, 3) + ' ' + navYear;
}
document.getElementById('prevMonth').addEventListener('click', () => {
  navMonth--; if (navMonth < 0) { navMonth = 11; navYear--; } updateMonthLabel(); renderAll();
});
document.getElementById('nextMonth').addEventListener('click', () => {
  navMonth++; if (navMonth > 11) { navMonth = 0; navYear++; } updateMonthLabel(); renderAll();
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
    if (tab.dataset.panel === 'reporte') renderReport();
  });
});

document.getElementById('fAmount').addEventListener('keydown', e => { if (e.key === 'Enter') addEntry(); });
document.getElementById('fDesc').addEventListener('keydown',   e => { if (e.key === 'Enter') document.getElementById('fAmount').focus(); });

function renderAll() {
  renderBudget();
  renderEntries();
  const active = document.querySelector('.panel.active')?.id;
  if (active === 'panel-reporte') renderReport();
}

// ── INIT ─────────────────────────────────────────────────────
updateMonthLabel();
loadFromSheets();
</script>
</body>
</html>
